<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridCut — 画像グリッド配置ツール</title>
<script src="./jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap');

  :root {
    --bg: #0f0e0d;
    --surface: #1a1917;
    --surface2: #232220;
    --border: #2e2c2a;
    --accent: #c8a96e;
    --accent2: #7eb8a4;
    --text: #e8e4df;
    --muted: #6b6560;
    --danger: #c86e6e;
    --grid-gap: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .logo span { color: var(--muted); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 57px);
  }

  /* ===== LEFT PANEL ===== */
  .panel-left {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ソース・グリッド設定・アクションは縮まない */
  .panel-left .fixed-section {
    flex-shrink: 0;
  }

  /* ライブラリセクションだけ余白を使って伸縮＋スクロール */
  .panel-left .lib-section {
    flex: 1 1 120px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  .panel-left .lib-section .thumb-list {
    flex: 1;
    overflow-y: auto;
    min-height: 60px;
  }

  .lib-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .lib-section-header .lib-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .btn-clear-lib {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.65rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .btn-clear-lib:hover { border-color: var(--danger); color: var(--danger); }

  .panel-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 14px;
  }

  .tab {
    flex: 1;
    padding: 7px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    border-radius: 3px;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e0d;
    font-weight: 700;
  }

  /* Drop Zone */
  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(200,169,110,0.05);
  }

  .dropzone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .dropzone-icon {
    font-size: 1.8rem;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .dropzone-text {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Slice Controls */
  .slice-controls { display: none; }
  .slice-controls.active { display: block; }

  .slice-preview-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    background: var(--surface2);
    cursor: crosshair;
    user-select: none;
  }

  .slice-preview-wrap img {
    width: 100%;
    display: block;
  }

  .slice-line {
    position: absolute;
    left: 0; right: 0;
    height: 44px;
    margin-top: -22px;
    display: flex;
    align-items: center;
    cursor: row-resize;
    z-index: 10;
  }

  /* 見た目の線 */
  .slice-line::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 2px;
    background: var(--accent);
    pointer-events: none;
  }

  .slice-line-label {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    background: rgba(15,14,13,0.85);
    padding: 1px 5px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
  }

  .slice-line .del-btn {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px; height: 36px;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 2;
    -webkit-tap-highlight-color: transparent;
  }

  .slice-line .del-btn:active { transform: translateY(-50%) scale(0.9); }

  .slice-add-hint {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }

  /* Thumbnail strip */
  .thumb-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 300px;
    overflow-y: auto;
  }

  .thumb-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px;
    cursor: grab;
    transition: border-color 0.15s;
  }

  .thumb-item:hover { border-color: var(--accent2); }
  .thumb-item.dragging { opacity: 0.4; }

  .thumb-item img {
    width: 40px;
    height: 52px;
    object-fit: cover;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .thumb-info {
    flex: 1;
    min-width: 0;
  }

  .thumb-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .thumb-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
    border-radius: 3px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .thumb-del:hover { color: var(--danger); }

  /* Grid Settings */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .setting-label {
    font-size: 0.78rem;
    color: var(--text);
  }

  .setting-control {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-small {
    width: 26px; height: 26px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .btn-small:hover { border-color: var(--accent); color: var(--accent); }

  .num-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    min-width: 24px;
    text-align: center;
    color: var(--accent);
  }

  .ratio-btns {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .ratio-btn {
    padding: 4px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }

  .ratio-btn.active, .ratio-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.08);
  }

  .gap-slider {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .gap-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* Action Buttons */
  .btn-primary {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #0f0e0d;
    border: none;
    border-radius: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-bottom: 6px;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    width: 100%;
    padding: 9px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.15s;
    margin-bottom: 6px;
  }

  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ===== CENTER CANVAS ===== */
  .panel-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .canvas-toolbar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .canvas-info {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .canvas-info strong {
    color: var(--accent);
    font-weight: 400;
  }

  .ml-auto { margin-left: auto; }

  .grid-area {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .grid-canvas {
    display: grid;
    gap: var(--grid-gap);
    background: #111;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .grid-cell {
    background: var(--surface2);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: outline 0.1s;
    min-width: 60px;
    min-height: 60px;
  }

  .grid-cell.drop-target { outline: 2px solid var(--accent2); }
  .grid-cell.selected { outline: 2px solid var(--accent); }

  .grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  /* フィットモード: contain（余白あり） */
  .grid-cell.fit-contain img {
    object-fit: contain;
    background: #0a0909;
  }

  /* フィットモード: auto-height（セルの高さが画像に合わせて可変） */
  .grid-canvas.fit-auto-height {
    align-items: start;
  }
  .grid-canvas.fit-auto-height .grid-cell {
    height: auto !important;
    overflow: visible;
  }
  .grid-canvas.fit-auto-height .grid-cell img {
    height: auto;
    object-fit: fill;
  }

  .cell-empty {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--border);
    letter-spacing: 0.1em;
  }

  .cell-badge {
    position: absolute;
    top: 4px; left: 4px;
    background: rgba(15,14,13,0.8);
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--accent);
    padding: 1px 4px;
    border-radius: 2px;
  }

  .cell-remove {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(200,110,110,0.85);
    border: none;
    color: #fff;
    width: 18px; height: 18px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.6rem;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .grid-cell:hover .cell-remove { display: flex; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .empty-icon { font-size: 3rem; opacity: 0.3; }
  .empty-text { font-size: 0.85rem; line-height: 1.7; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--accent2);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 0.8rem;
    z-index: 1000;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .main { flex-direction: column; height: auto; min-height: calc(100vh - 49px); }
    .panel-left {
      width: 100%;
      min-width: unset;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 70vh;
      overflow-y: auto;
    }
    .panel-center { height: 60vw; min-height: 280px; flex-shrink: 0; }
    .canvas-toolbar { padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
    .grid-area { padding: 12px; }
  }

  /* ===== PREVIEW MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open {
    opacity: 1; pointer-events: all;
  }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-width: 92vw;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    transform: scale(0.96);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal-box {
    transform: scale(1);
  }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .modal-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--accent);
  }
  .modal-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--danger); }
  .modal-img-wrap {
    overflow: auto;
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
    background: #0a0909;
  }
  .modal-img-wrap img {
    max-width: 100%;
    border-radius: 4px;
    display: block;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  }
  .modal-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }
  .modal-hint {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }
  .modal-hint strong { color: var(--accent2); }
  .modal-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .modal-actions .modal-btn-save {
    flex: 1;
    min-width: 100px;
  }
  .modal-btn-save {
    flex: 1;
    padding: 11px;
    background: var(--accent2);
    color: #0f0e0d;
    border: none;
    border-radius: 5px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: opacity 0.15s;
  }
  .modal-btn-save:hover { opacity: 0.85; }
  .modal-btn-cancel {
    padding: 11px 16px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .modal-btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .filename-input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .filename-input:focus { border-color: var(--accent); }
  .filename-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filename-ext {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Slice tab confirm button */
  .btn-accent-sm {
    padding: 6px 12px;
    background: var(--accent2);
    color: #0f0e0d;
    border: none;
    border-radius: 3px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    display: block;
    width: 100%;
    margin-top: 10px;
  }
  .btn-accent-sm:hover { opacity: 0.85; }

  .badge-count {
    background: var(--accent);
    color: #0f0e0d;
    font-size: 0.6rem;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 5px;
    margin-left: 4px;
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">GRID<span>/</span>CUT</div>
  <div style="font-size:0.75rem; color:var(--muted);">画像グリッド配置ツール</div>
</header>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="panel-left">

    <!-- Source Tabs -->
    <div class="panel-section fixed-section">
      <div class="panel-label">ソース選択</div>
      <div class="tabs">
        <div class="tab active" id="tab-slice" onclick="switchTab('slice')">1枚をカット</div>
        <div class="tab" id="tab-multi" onclick="switchTab('multi')">複数枚追加</div>
      </div>

      <!-- SLICE TAB -->
      <div id="pane-slice">
        <div class="dropzone" id="dz-slice">
          <input type="file" accept="image/*" onchange="loadSliceImage(this)">
          <div class="dropzone-icon">🖼</div>
          <div class="dropzone-text">縦長画像をドロップ<br>またはクリックして選択</div>
        </div>

        <div class="slice-controls" id="slice-controls" style="margin-top:12px;">
          <div class="panel-label" style="margin-bottom:8px;">クリックで分割線を追加</div>

          <!-- 自動分割 -->
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
            <span style="font-size:0.75rem; color:var(--text); white-space:nowrap;">自動分割</span>
            <button class="btn-small" onclick="adjAutoN(-1)">−</button>
            <div class="num-display" id="auto-n-display">4</div>
            <button class="btn-small" onclick="adjAutoN(1)">＋</button>
            <span style="font-size:0.72rem; color:var(--muted);">等分</span>
            <button onclick="applyAutoSlice()" style="flex:1; padding:5px 8px; background:var(--accent); color:#0f0e0d; border:none; border-radius:3px; font-size:0.72rem; font-weight:700; cursor:pointer; white-space:nowrap;">⚡ 適用</button>

          </div>
          <div class="slice-add-hint">↑ 画像をタップ/クリックで分割線追加・ドラッグで微調整</div>
          <button class="btn-accent-sm" onclick="applySlices()">✂ カットしてライブラリへ追加</button>
        </div>

      <!-- MULTI TAB -->
      <div id="pane-multi" style="display:none;">
        <div class="dropzone" id="dz-multi">
          <input type="file" accept="image/*" multiple onchange="loadMultiImages(this)">
          <div class="dropzone-icon">📁</div>
          <div class="dropzone-text">複数枚を一括選択<br>またはここへドロップ</div>

    <!-- Library -->
    <div class="lib-section">

        <button class="btn-clear-lib" onclick="clearLibrary()">全削除</button>
      </div>
      <div class="thumb-list" id="thumb-list">
        <div style="font-size:0.75rem; color:var(--muted); text-align:center; padding:12px;">
          画像を追加してください
        </div>
      </div>
    </div>

    <!-- Grid Settings -->
    <div class="panel-section fixed-section">
      <div class="panel-label">グリッド設定</div>

      <div class="setting-row">
        <div class="setting-label">列数</div>
        <div class="setting-control">
          <button class="btn-small" onclick="adjCols(-1)">−</button>
          <div class="num-display" id="col-display">3</div>
          <button class="btn-small" onclick="adjCols(1)">＋</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-label">行数</div>
        <div class="setting-control">
          <button class="btn-small" onclick="adjRows(-1)">−</button>
          <div class="num-display" id="row-display">4</div>
          <button class="btn-small" onclick="adjRows(1)">＋</button>
        </div>
      </div>

      <div class="setting-row" style="margin-bottom:6px;">
        <div class="setting-label">セル比率</div>
      </div>
      <div class="ratio-btns" id="ratio-btns">
        <button class="ratio-btn active" onclick="setRatio(4,6,this)">4:6</button>
        <button class="ratio-btn" onclick="setRatio(1,1,this)">1:1</button>
        <button class="ratio-btn" onclick="setRatio(16,9,this)">16:9</button>
        <button class="ratio-btn" onclick="setRatio(9,16,this)">9:16</button>
        <button class="ratio-btn" onclick="setRatio(3,4,this)">3:4</button>
      </div>

      <div class="setting-row" style="margin-top:10px;">
        <div class="setting-label">ギャップ <span class="num-display" id="gap-display" style="font-size:0.75rem;">4</span>px</div>
        <input type="range" class="gap-slider" min="0" max="20" value="4" oninput="setGap(this.value)">
      </div>

      <div class="setting-row" style="margin-bottom:6px; margin-top:10px;">
        <div class="setting-label">画像フィット</div>
      </div>
      <div class="ratio-btns" id="fit-btns">
        <button class="ratio-btn active" onclick="setFitMode('cover',this)" title="セルを埋める（トリミング）">クロップ</button>
        <button class="ratio-btn" onclick="setFitMode('contain',this)" title="画像全体を表示（余白あり）">余白</button>
        <button class="ratio-btn" onclick="setFitMode('auto-height',this)" title="最長画像に合わせて行高を伸ばす">高さ合わせ</button>
      </div>

    <!-- Actions -->
    <div class="panel-section fixed-section">
      <button class="btn-primary" onclick="autoFill()">⚡ 自動配置</button>
      <button class="btn-secondary" onclick="clearGrid()">🗑 グリッドをクリア</button>
      <button class="btn-primary" style="background:var(--accent2);" onclick="exportGrid()">💾 画像として保存</button>
    </div>

  </div>

  <!-- CENTER CANVAS -->
  <div class="panel-center">
    <div class="canvas-toolbar">
      <div class="canvas-info">
        グリッド: <strong id="info-cols">3</strong>列 × <strong id="info-rows">4</strong>行
        &nbsp;|&nbsp;
        配置済み: <strong id="info-filled">0</strong> / <strong id="info-total">12</strong>
      </div>
      <div class="ml-auto" style="display:flex; gap:8px;">
        <button class="btn-small" title="ズームアウト" onclick="zoom(-0.1)">−</button>
        <div class="num-display" id="zoom-display" style="font-size:0.7rem; min-width:36px;">100%</div>
        <button class="btn-small" title="ズームイン" onclick="zoom(0.1)">＋</button>
        <button class="btn-small" title="フィット" onclick="zoomFit()">⊡</button>
      </div>
    </div>

    <div class="grid-area" id="grid-area">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎨</div>
        <div class="empty-text">左パネルから画像を追加して<br>グリッドを設定してください</div>
      </div>
      <div class="grid-canvas" id="grid-canvas" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- ===== PREVIEW MODAL ===== -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">PREVIEW — 保存確認</div>
      <button class="modal-close" id="modal-close-btn">×</button>
    </div>
    <div class="modal-img-wrap">
      <img id="preview-img" src="" alt="プレビュー">
    </div>
    <div class="modal-footer">
      <div class="modal-hint" id="save-hint"></div>
      <div class="filename-row">
        <input type="text" class="filename-input" id="filename-input" value="gridcut" placeholder="ファイル名">
        <span class="filename-ext">.png</span>
      </div>
      <div class="modal-actions">
        <a class="modal-btn-save" id="save-link" download="gridcut.png" href="#">💾 PNG保存</a>
        <button class="modal-btn-save" id="save-pdf-btn" style="background:var(--accent);">📄 PDF保存</button>
        <button class="modal-btn-cancel" id="modal-cancel-btn">閉じる</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

// ===== STATE =====
let library = [];
let grid = { cols: 3, rows: 4, ratioW: 4, ratioH: 6, gap: 4 };
let cells = [];
let zoomLevel = 1.0;
let sliceLines = [];
let sliceImg = null;
let autoN = 4;
let draggingThumb = null;
let draggingCell = null;
let libIdCounter = 0;
let fitMode = 'cover'; // 'cover' | 'contain' | 'auto-height'

// ===== INIT =====
initGrid();

function initGrid() {
  const total = grid.cols * grid.rows;
  cells = Array(total).fill(null);
  renderGrid();
  updateInfo();
}

// ===== TAB SWITCH =====
function switchTab(tab) {
  document.getElementById('tab-slice').classList.toggle('active', tab === 'slice');
  document.getElementById('tab-multi').classList.toggle('active', tab === 'multi');
  document.getElementById('pane-slice').style.display = tab === 'slice' ? '' : 'none';
  document.getElementById('pane-multi').style.display = tab === 'multi' ? '' : 'none';
}
window.switchTab = switchTab;

// ===== SLICE TAB =====
function adjAutoN(d) {
  autoN = Math.max(2, Math.min(20, autoN + d));
  document.getElementById('auto-n-display').textContent = autoN;
}
window.adjAutoN = adjAutoN;

function applyAutoSlice() {
  if (!sliceImg) { showToast('先に画像を読み込んでください'); return; }
  sliceLines = [];
  for (let i = 1; i < autoN; i++) {
    sliceLines.push(Math.round((i / autoN) * 1000) / 10);
  }
  renderSliceLines();
  showToast(`${autoN}等分の分割線を追加しました`);
}
window.applyAutoSlice = applyAutoSlice;

function loadSliceImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('slice-img');
    img.src = e.target.result;
    sliceImg = { name: file.name, dataUrl: e.target.result };
    sliceLines = [];
    document.getElementById('slice-controls').classList.add('active');
    renderSliceLines();
  };
  reader.readAsDataURL(file);
}
window.loadSliceImage = loadSliceImage;

const sliceWrap = document.getElementById('slice-wrap');

// クリック／タップで分割線追加
sliceWrap.addEventListener('click', e => {
  if (e.target.closest('.slice-line')) return;
  const rect = sliceWrap.getBoundingClientRect();
  const pct = ((e.clientY - rect.top) / rect.height) * 100;
  if (pct < 0.5 || pct > 99.5) return;
  sliceLines.push(Math.round(pct * 10) / 10);
  sliceLines.sort((a, b) => a - b);
  renderSliceLines();
});

function renderSliceLines() {
  sliceWrap.querySelectorAll('.slice-line').forEach(el => el.remove());

  sliceLines.forEach((pct, i) => {
    // ドラッグ中にsortが走ってもインデックスがずれないようスナップショット
    const myIndex = () => sliceLines.indexOf(sliceLines[i]);

    const line = document.createElement('div');
    line.className = 'slice-line';
    line.style.top = pct + '%';

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '×';
    const doDelete = e => {
      e.preventDefault();
      e.stopPropagation();
      // 現在値で正確に特定して削除
      const val = parseFloat(line.style.top);
      const idx = sliceLines.findIndex(v => Math.abs(v - val) < 0.01);
      if (idx !== -1) sliceLines.splice(idx, 1);
      renderSliceLines();
    };
    del.addEventListener('click', doDelete);
    del.addEventListener('touchend', doDelete);
    line.appendChild(del);

    const label = document.createElement('span');
    label.className = 'slice-line-label';
    label.textContent = `cut ${i+1}  ${pct.toFixed(1)}%`;
    line.appendChild(label);

    // ===== マウスドラッグ =====
    line.addEventListener('mousedown', e => {
      if (e.target === del) return;
      e.stopPropagation();
      e.preventDefault();
      const startY = e.clientY;
      const startPct = parseFloat(line.style.top);
      const rect = sliceWrap.getBoundingClientRect();
      // ドラッグ対象の現在値を記録
      let currentVal = startPct;

      const onMove = ev => {
        const delta = ((ev.clientY - startY) / rect.height) * 100;
        const newPct = Math.max(0.5, Math.min(99.5, startPct + delta));
        const rounded = Math.round(newPct * 10) / 10;
        // sliceLines内で現在値を探して更新
        const idx = sliceLines.findIndex(v => Math.abs(v - currentVal) < 0.5);
        if (idx !== -1) sliceLines[idx] = rounded;
        currentVal = rounded;
        line.style.top = rounded + '%';
        label.textContent = `cut ${i+1}  ${rounded.toFixed(1)}%`;
      };
      const onUp = () => {
        sliceLines.sort((a, b) => a - b);
        renderSliceLines();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // ===== タッチドラッグ =====
    line.addEventListener('touchstart', e => {
      if (e.target === del) return;
      e.stopPropagation();
      e.preventDefault();
      const touch = e.touches[0];
      const startY = touch.clientY;
      const startPct = parseFloat(line.style.top);
      const rect = sliceWrap.getBoundingClientRect();
      let currentVal = startPct;

      const onMove = ev => {
        const t = ev.touches[0];
        const delta = ((t.clientY - startY) / rect.height) * 100;
        const newPct = Math.max(0.5, Math.min(99.5, startPct + delta));
        const rounded = Math.round(newPct * 10) / 10;
        const idx = sliceLines.findIndex(v => Math.abs(v - currentVal) < 0.5);
        if (idx !== -1) sliceLines[idx] = rounded;
        currentVal = rounded;
        line.style.top = rounded + '%';
        label.textContent = `cut ${i+1}  ${rounded.toFixed(1)}%`;
      };
      const onEnd = () => {
        sliceLines.sort((a, b) => a - b);
        renderSliceLines();
        line.removeEventListener('touchmove', onMove);
        line.removeEventListener('touchend', onEnd);
      };
      line.addEventListener('touchmove', onMove, { passive: false });
      line.addEventListener('touchend', onEnd);
    }, { passive: false });

    sliceWrap.appendChild(line);
  });
}

async function applySlices() {
  if (!sliceImg) return;
  const img = new Image();
  img.src = sliceImg.dataUrl;
  await new Promise(r => { img.onload = r; });

  const cuts = [0, ...sliceLines.map(p => (p / 100) * img.height), img.height];
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  for (let i = 0; i < cuts.length - 1; i++) {
    const y0 = cuts[i], y1 = cuts[i + 1];
    const h = Math.round(y1 - y0);
    if (h < 2) continue;
    canvas.width = img.width;
    canvas.height = h;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, -y0);
    const dataUrl = canvas.toDataURL('image/png');
    addToLibrary(`${sliceImg.name}_cut${i+1}`, dataUrl);
  }

  showToast(`${cuts.length - 1}枚のカットをライブラリへ追加しました`);
}
window.applySlices = applySlices;

// ===== MULTI TAB =====
function loadMultiImages(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => addToLibrary(file.name, e.target.result);
    reader.readAsDataURL(file);
  });
  showToast(`${files.length}枚を追加しました`);
}
window.loadMultiImages = loadMultiImages;

// Drag and drop for multi tab
const dzMulti = document.getElementById('dz-multi');
dzMulti.addEventListener('dragover', e => { e.preventDefault(); dzMulti.classList.add('drag-over'); });
dzMulti.addEventListener('dragleave', () => dzMulti.classList.remove('drag-over'));
dzMulti.addEventListener('drop', e => {
  e.preventDefault();
  dzMulti.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => addToLibrary(file.name, ev.target.result);
    reader.readAsDataURL(file);
  });
});

const dzSlice = document.getElementById('dz-slice');
dzSlice.addEventListener('dragover', e => { e.preventDefault(); dzSlice.classList.add('drag-over'); });
dzSlice.addEventListener('dragleave', () => dzSlice.classList.remove('drag-over'));
dzSlice.addEventListener('drop', e => {
  e.preventDefault();
  dzSlice.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('slice-img');
      img.src = ev.target.result;
      sliceImg = { name: file.name, dataUrl: ev.target.result };
      sliceLines = [];
      document.getElementById('slice-controls').classList.add('active');
      renderSliceLines();
    };
    reader.readAsDataURL(file);
  }
});

// ===== LIBRARY =====
function addToLibrary(name, dataUrl) {
  const id = ++libIdCounter;
  library.push({ id, name, dataUrl });
  renderLibrary();
}

function renderLibrary() {
  const list = document.getElementById('thumb-list');
  document.getElementById('lib-count').textContent = library.length;

  if (library.length === 0) {
    list.innerHTML = '<div style="font-size:0.75rem; color:var(--muted); text-align:center; padding:12px;">画像を追加してください</div>';
    return;
  }

  list.innerHTML = '';
  library.forEach(item => {
    const el = document.createElement('div');
    el.className = 'thumb-item';
    el.draggable = true;
    el.dataset.id = item.id;
    el.innerHTML = `
      <img src="${item.dataUrl}" alt="">
      <div class="thumb-info">
        <div class="thumb-name">${item.name}</div>
      </div>
      <button class="thumb-del" onclick="removeFromLibrary(${item.id})" title="削除">×</button>
    `;

    el.addEventListener('dragstart', e => {
      draggingThumb = item.id;
      e.dataTransfer.effectAllowed = 'copy';
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      draggingThumb = null;
    });

    el.addEventListener('click', () => placeInFirstEmpty(item.id));
    list.appendChild(el);
  });
}

function removeFromLibrary(id) {
  library = library.filter(l => l.id !== id);
  cells = cells.map(c => c === id ? null : c);
  renderLibrary();
  renderGrid();
  updateInfo();
}
window.removeFromLibrary = removeFromLibrary;

function clearLibrary() {
  if (library.length === 0) return;
  library = [];
  cells = cells.map(() => null);
  renderLibrary();
  renderGrid();
  updateInfo();
  showToast('ライブラリを全削除しました');
}
window.clearLibrary = clearLibrary;

function placeInFirstEmpty(imgId) {
  const idx = cells.indexOf(null);
  if (idx === -1) { showToast('空きセルがありません'); return; }
  cells[idx] = imgId;
  renderGrid();
  updateInfo();
}

// ===== GRID SETTINGS =====
function adjCols(d) {
  grid.cols = Math.max(1, Math.min(10, grid.cols + d));
  document.getElementById('col-display').textContent = grid.cols;
  document.getElementById('info-cols').textContent = grid.cols;
  resizeCells();
}
window.adjCols = adjCols;

function adjRows(d) {
  grid.rows = Math.max(1, Math.min(20, grid.rows + d));
  document.getElementById('row-display').textContent = grid.rows;
  document.getElementById('info-rows').textContent = grid.rows;
  resizeCells();
}
window.adjRows = adjRows;

function resizeCells() {
  const total = grid.cols * grid.rows;
  if (cells.length < total) {
    cells = [...cells, ...Array(total - cells.length).fill(null)];
  } else {
    cells = cells.slice(0, total);
  }
  renderGrid();
  updateInfo();
}

function setRatio(w, h, btn) {
  grid.ratioW = w; grid.ratioH = h;
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
window.setRatio = setRatio;

function setGap(v) {
  grid.gap = parseInt(v);
  document.getElementById('gap-display').textContent = v;
  document.documentElement.style.setProperty('--grid-gap', v + 'px');
  renderGrid();
}
window.setGap = setGap;

function setFitMode(mode, btn) {
  fitMode = mode;
  document.querySelectorAll('#fit-btns .ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
window.setFitMode = setFitMode;

// ===== RENDER GRID =====
function renderGrid() {
  const canvas = document.getElementById('grid-canvas');
  const emptyState = document.getElementById('empty-state');

  const total = grid.cols * grid.rows;
  if (cells.length !== total) {
    cells = Array(total).fill(null).map((_, i) => cells[i] || null);
  }

  canvas.style.display = 'grid';
  emptyState.style.display = 'none';

  // Cell size based on available area and ratio
  const availW = Math.min(800, document.getElementById('grid-area').clientWidth - 48);
  const cellW = Math.floor((availW - grid.gap * (grid.cols - 1)) / grid.cols);
  const cellH = Math.round(cellW * (grid.ratioH / grid.ratioW));

  canvas.style.gridTemplateColumns = `repeat(${grid.cols}, ${cellW}px)`;
  // auto-heightモードでは行高をautoに、それ以外は固定
  if (fitMode === 'auto-height') {
    canvas.style.gridTemplateRows = `repeat(${grid.rows}, auto)`;
    canvas.classList.add('fit-auto-height');
  } else {
    canvas.style.gridTemplateRows = `repeat(${grid.rows}, ${cellH}px)`;
    canvas.classList.remove('fit-auto-height');
  }
  canvas.style.gap = grid.gap + 'px';
  canvas.style.transform = `scale(${zoomLevel})`;
  canvas.style.transformOrigin = 'top left';

  canvas.innerHTML = '';

  cells.forEach((imgId, idx) => {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.dataset.idx = idx;

    const imgItem = imgId ? library.find(l => l.id === imgId) : null;

    if (imgItem) {
      const img = document.createElement('img');
      img.src = imgItem.dataUrl;
      // fitModeをセルに反映
      if (fitMode === 'contain') cell.classList.add('fit-contain');
      cell.appendChild(img);

      const badge = document.createElement('div');
      badge.className = 'cell-badge';
      badge.textContent = idx + 1;
      cell.appendChild(badge);

      const rm = document.createElement('button');
      rm.className = 'cell-remove';
      rm.textContent = '×';
      rm.onclick = e => { e.stopPropagation(); cells[idx] = null; renderGrid(); updateInfo(); };
      cell.appendChild(rm);
    } else {
      const emp = document.createElement('div');
      emp.className = 'cell-empty';
      emp.textContent = (idx + 1).toString().padStart(2, '0');
      cell.appendChild(emp);
    }

    // Drop from library
    cell.addEventListener('dragover', e => {
      e.preventDefault();
      cell.classList.add('drop-target');
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drop-target'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drop-target');
      if (draggingThumb) {
        cells[idx] = draggingThumb;
        renderGrid();
        updateInfo();
      } else if (draggingCell !== null && draggingCell !== idx) {
        // swap
        [cells[draggingCell], cells[idx]] = [cells[idx], cells[draggingCell]];
        draggingCell = null;
        renderGrid();
        updateInfo();
      }
    });

    // Drag cell to reorder
    cell.draggable = true;
    cell.addEventListener('dragstart', e => {
      if (imgId) {
        draggingCell = idx;
        e.dataTransfer.effectAllowed = 'move';
      } else {
        e.preventDefault();
      }
    });

    canvas.appendChild(cell);
  });

  updateInfo();
}

function updateInfo() {
  const total = grid.cols * grid.rows;
  const filled = cells.filter(c => c !== null).length;
  document.getElementById('info-cols').textContent = grid.cols;
  document.getElementById('info-rows').textContent = grid.rows;
  document.getElementById('info-filled').textContent = filled;
  document.getElementById('info-total').textContent = total;
}

// ===== AUTO FILL =====
// ===== AUTO FILL =====
function autoFill() {
  if (library.length === 0) { showToast('先にライブラリへ画像を追加してください'); return; }

  const n = library.length;

  // セル比率から「見た目の縦横比」が1に最も近い列数を全通り探索
  // 例: 13枚, 4:6比率 → cols=3,rows=5(15マス) or cols=4,rows=4(16マス) を比較
  let bestCols = 1, bestRows = n, bestScore = Infinity;
  for (let c = 1; c <= n; c++) {
    const r = Math.ceil(n / c); // n枚全て入る最小行数
    // セル比率を考慮した画面上の見た目サイズ比率
    const displayW = c * grid.ratioW;
    const displayH = r * grid.ratioH;
    const ratio = displayW / displayH;
    // 目標: 縦長より横長気味(0.8〜1.2)で最も1.0に近いものを選ぶ
    const score = Math.abs(ratio - 1.0);
    if (score < bestScore) {
      bestScore = score;
      bestCols = c;
      bestRows = r;
    }
  }

  const cols = bestCols;
  const rows = bestRows;
  const total = cols * rows; // >= n が保証される

  // グリッド設定を更新
  grid.cols = cols;
  grid.rows = rows;
  document.getElementById('col-display').textContent = cols;
  document.getElementById('row-display').textContent = rows;

  // cells を total サイズで初期化し、先頭 n 個に画像を配置、残りは null（空白）
  cells = Array(total).fill(null);
  for (let i = 0; i < n; i++) {
    cells[i] = library[i].id;
  }

  renderGrid();
  updateInfo();
  const blank = total - n;
  showToast(`${n}枚を ${cols}列×${rows}行 に配置${blank > 0 ? `（空き${blank}マス）` : ''}`);
}
window.autoFill = autoFill;

// ===== CLEAR =====
function clearGrid() {
  cells = Array(grid.cols * grid.rows).fill(null);
  renderGrid();
  updateInfo();
  showToast('グリッドをクリアしました');
}
window.clearGrid = clearGrid;

// ===== ZOOM =====
function zoom(delta) {
  zoomLevel = Math.max(0.3, Math.min(2.5, zoomLevel + delta));
  document.getElementById('zoom-display').textContent = Math.round(zoomLevel * 100) + '%';
  renderGrid();
}
window.zoom = zoom;

function zoomFit() {
  zoomLevel = 1.0;
  document.getElementById('zoom-display').textContent = '100%';
  renderGrid();
}
window.zoomFit = zoomFit;

// ===== EXPORT / PREVIEW MODAL =====
function isMobile() {
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
}

async function buildGridCanvas() {
  const BASE_CELL_W = 400;
  const cellW = BASE_CELL_W;
  const baseCellH = Math.round(cellW * (grid.ratioH / grid.ratioW));

  // auto-heightモード: 各列の最大アスペクトに合わせて行ごとの高さを計算
  // contain/coverモード: 全行同じ高さ
  let rowHeights = Array(grid.rows).fill(baseCellH);

  if (fitMode === 'auto-height') {
    // 各行の画像を読み込んで最大高さを求める
    const imgCache = {};
    for (let i = 0; i < cells.length; i++) {
      if (!cells[i]) continue;
      const item = library.find(l => l.id === cells[i]);
      if (!item) continue;
      if (!imgCache[cells[i]]) {
        const img = new Image();
        await new Promise(r => { img.onload = r; img.src = item.dataUrl; });
        imgCache[cells[i]] = img;
      }
    }
    for (let row = 0; row < grid.rows; row++) {
      let maxH = 0;
      for (let col = 0; col < grid.cols; col++) {
        const idx = row * grid.cols + col;
        if (!cells[idx]) continue;
        const img = imgCache[cells[idx]];
        if (!img) continue;
        const h = Math.round(cellW * img.naturalHeight / img.naturalWidth);
        if (h > maxH) maxH = h;
      }
      rowHeights[row] = maxH > 0 ? maxH : baseCellH;
    }
  }

  const totalW = cellW * grid.cols + grid.gap * (grid.cols - 1);
  const totalH = rowHeights.reduce((s, h) => s + h, 0) + grid.gap * (grid.rows - 1);

  const canvas = document.createElement('canvas');
  canvas.width = totalW;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, totalW, totalH);

  // 行のY座標を事前計算
  const rowY = [];
  let yAcc = 0;
  for (let r = 0; r < grid.rows; r++) {
    rowY[r] = yAcc;
    yAcc += rowHeights[r] + grid.gap;
  }

  for (let i = 0; i < cells.length; i++) {
    const col = i % grid.cols;
    const row = Math.floor(i / grid.cols);
    const x = col * (cellW + grid.gap);
    const y = rowY[row];
    const cH = rowHeights[row];

    if (cells[i]) {
      const item = library.find(l => l.id === cells[i]);
      if (item) {
        const img = new Image();
        await new Promise(r => { img.onload = r; img.src = item.dataUrl; });

        if (fitMode === 'contain' || fitMode === 'auto-height') {
          // contain: セル内にfitさせて余白は背景色
          const iR = img.naturalWidth / img.naturalHeight;
          const cR = cellW / cH;
          let dw, dh, dx, dy;
          if (iR > cR) {
            dw = cellW; dh = Math.round(cellW / iR);
            dx = x; dy = y + Math.round((cH - dh) / 2);
          } else {
            dh = cH; dw = Math.round(cH * iR);
            dx = x + Math.round((cellW - dw) / 2); dy = y;
          }
          ctx.fillStyle = '#0a0909';
          ctx.fillRect(x, y, cellW, cH);
          ctx.drawImage(img, dx, dy, dw, dh);
        } else {
          // cover: トリミング
          const iR = img.naturalWidth / img.naturalHeight;
          const cR = cellW / cH;
          let sw, sh, sx, sy;
          if (iR > cR) {
            sh = img.naturalHeight; sw = sh * cR;
            sx = (img.naturalWidth - sw) / 2; sy = 0;
          } else {
            sw = img.naturalWidth; sh = sw / cR;
            sx = 0; sy = (img.naturalHeight - sh) / 2;
          }
          ctx.drawImage(img, sx, sy, sw, sh, x, y, cellW, cH);
        }
      }
    } else {
      ctx.fillStyle = '#1a1917';
      ctx.fillRect(x, y, cellW, cH);
    }
  }
  return canvas;
}

async function exportGrid() {
  const filled = cells.filter(c => c !== null).length;
  if (filled === 0) { showToast('グリッドに画像を配置してください'); return; }

  showToast('レンダリング中...');

  const canvas = await buildGridCanvas();
  const dataUrl = canvas.toDataURL('image/png');

  document.getElementById('preview-img').src = dataUrl;

  const ts = new Date();
  const defaultName = `gridcut_${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}`;
  document.getElementById('filename-input').value = defaultName;

  updateSaveLink(dataUrl, defaultName);

  document.getElementById('filename-input').oninput = e => {
    updateSaveLink(dataUrl, e.target.value || 'gridcut');
  };

  const hint = document.getElementById('save-hint');
  if (isMobile()) {
    hint.innerHTML = `📱 <strong>PNG</strong>：画像を長押し → 「写真に保存」または💾ボタン<br>📄 <strong>PDF</strong>：PDF保存ボタンで直接ダウンロード`;
  } else {
    hint.innerHTML = `🖥️ <strong>PNG</strong>：💾ボタンでダウンロード / 右クリック → 名前を付けて保存<br>📄 <strong>PDF</strong>：PDF保存ボタンで直接ダウンロード`;
  }

  document.getElementById('preview-modal').classList.add('open');
}
window.exportGrid = exportGrid;

function updateSaveLink(dataUrl, name) {
  const link = document.getElementById('save-link');
  link.href = dataUrl;
  link.download = (name || 'gridcut').replace(/\.png$/i, '') + '.png';
}

function savePDF() {
  const dataUrl = document.getElementById('preview-img').src;
  if (!dataUrl || dataUrl === window.location.href) { showToast('先にプレビューを生成してください'); return; }

  if (!window.jspdf) { showToast('jsPDFの読み込み中です。少し待って再試行してください'); return; }

  const name = (document.getElementById('filename-input').value || 'gridcut').replace(/\.pdf$/i, '');
  const { jsPDF } = window.jspdf;

  const img = new Image();
  img.onload = () => {
    const imgW = img.naturalWidth;
    const imgH = img.naturalHeight;

    // 画像の縦横比に合わせてPDFページサイズを決定（余白なし）
    const isLandscape = imgW > imgH;
    const orientation = isLandscape ? 'landscape' : 'portrait';

    // pxをmmに変換（96dpi基準）
    const pxToMm = px => px * 25.4 / 96;
    const mmW = pxToMm(imgW);
    const mmH = pxToMm(imgH);

    const pdf = new jsPDF({
      orientation,
      unit: 'mm',
      format: [mmW, mmH], // 画像サイズそのままのページ
    });

    pdf.addImage(dataUrl, 'PNG', 0, 0, mmW, mmH, '', 'FAST');
    pdf.save(name + '.pdf');
    showToast('PDFを保存しました！');
  };
  img.src = dataUrl;
}
window.savePDF = savePDF;

function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
}

// ===== MODAL EVENT LISTENERS =====
document.getElementById('modal-close-btn').addEventListener('click', closePreview);
document.getElementById('modal-cancel-btn').addEventListener('click', closePreview);
document.getElementById('save-pdf-btn').addEventListener('click', savePDF);
document.getElementById('preview-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('preview-modal')) closePreview();
});

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init render
renderGrid();

}); // DOMContentLoaded
</script>
</body>
